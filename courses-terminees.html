<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses terminées — Trail Philou</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── GRILLE DE COURSES ── */
    .races-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .race-thumb {
      background: white; border-radius: var(--r-lg);
      border: 1px solid var(--gray-200);
      cursor: pointer; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .race-thumb:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.1); border-color: var(--blue-mid); }
    .race-thumb-top {
      height: 10px;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }
    .race-thumb-body { padding: 1.25rem; }
    .race-thumb-year {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--green); margin-bottom: 0.4rem;
    }
    .race-thumb-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem; font-weight: 800;
      color: var(--gray-900); margin-bottom: 0.5rem; line-height: 1.3;
    }
    .race-thumb-loc { font-size: 0.8rem; color: var(--gray-400); margin-bottom: 0.875rem; }
    .race-thumb-stats { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .race-thumb-stat {
      background: var(--gray-50); border-radius: var(--r-sm);
      padding: 0.3rem 0.65rem; font-size: 0.75rem; font-weight: 600; color: var(--gray-600);
    }
    .race-thumb-footer {
      border-top: 1px solid var(--gray-100);
      padding: 0.75rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .race-thumb-time {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem; font-weight: 800; color: var(--blue);
    }
    .race-thumb-rank { font-size: 0.75rem; color: var(--gray-400); }
    .race-thumb-icons { display: flex; gap: 0.4rem; }
    .media-icon {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
    }
    .media-icon.has-vid { background: var(--green-light); }
    .media-icon.has-img { background: var(--blue-light); }

    /* ── PANEL DÉTAIL (drawer) ── */
    .detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 150;
      background: rgba(15,26,33,0.5); backdrop-filter: blur(3px);
    }
    .detail-overlay.open { display: block; }
    .detail-drawer {
      position: fixed; top: 0; right: -100%; bottom: 0;
      width: min(620px, 100vw);
      background: white; z-index: 151;
      overflow-y: auto;
      transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
      box-shadow: -8px 0 40px rgba(0,0,0,0.15);
    }
    .detail-drawer.open { right: 0; }
    .drawer-hero {
      height: 8px;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }
    .drawer-header {
      padding: 1.5rem 1.75rem 1.25rem;
      border-bottom: 1px solid var(--gray-100);
      position: sticky; top: 0; background: white; z-index: 10;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
    }
    .drawer-close {
      background: var(--gray-100); border: none; border-radius: 50%;
      width: 34px; height: 34px; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .drawer-close:hover { background: var(--gray-200); }
    .drawer-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem; font-weight: 800; color: var(--gray-900); line-height: 1.2;
    }
    .drawer-sub { font-size: 0.82rem; color: var(--gray-400); margin-top: 0.2rem; }
    .drawer-body { padding: 1.5rem 1.75rem; }
    .drawer-section { margin-bottom: 2rem; }
    .drawer-section-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--gray-400); margin-bottom: 0.875rem;
    }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .result-box {
      background: var(--gray-50); border-radius: var(--r-md); padding: 1rem;
    }
    .result-box .rb-val {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem; font-weight: 800; color: var(--gray-900);
    }
    .result-box .rb-lbl { font-size: 0.72rem; color: var(--gray-400); font-weight: 500; margin-top: 0.15rem; }
    .result-box.accent { background: var(--blue-light); }
    .result-box.accent .rb-val { color: var(--blue-dark); }
    .drawer-notes {
      background: var(--gray-50); border-radius: var(--r-md);
      padding: 1rem 1.25rem; font-size: 0.9rem; line-height: 1.7;
      color: var(--gray-600); border-left: 3px solid var(--blue);
    }
    .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
    .photo-item {
      aspect-ratio: 1; border-radius: var(--r-md); overflow: hidden;
      border: 1px solid var(--gray-200); cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
    .photo-item:hover img { transform: scale(1.05); }
    .video-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .video-item { border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--gray-200); }
    .video-item video { width: 100%; display: block; max-height: 260px; background: var(--gray-900); }

    /* Lightbox photo */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: var(--r-md); }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo">TRAIL PHILOU</div><div class="logo-sub">Mon univers trail</div></div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-link"><span class="ni">🏠</span> Accueil</a>
    <div class="sidebar-section">Mon trail</div>
    <a href="statistiques.html" class="nav-link"><span class="ni">📊</span> Statistiques</a>
    <a href="courses-terminees.html" class="nav-link active"><span class="ni">🏆</span> Courses terminées</a>
    <a href="prochaines-courses.html" class="nav-link"><span class="ni">🗓️</span> Prochaines courses</a>
    <a href="materiel.html" class="nav-link"><span class="ni">🎒</span> Mon matériel</a>
    <div style="flex:1"></div>
  </nav>
  <div class="sidebar-bottom" id="userBottom" style="display:none">
    <div class="user-pill">
      <div class="user-avatar" id="userAv">?</div>
      <div class="user-name" id="userName">—</div>
      <button class="btn-logout" id="btnLogout">⎋</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div class="page-title">🏆 Courses terminées</div>
    <div class="page-sub">Cliquez sur une course pour voir les détails, résultats et médias</div>
  </div>
  <div class="page-content">
    <div class="races-grid" id="racesGrid">
      <div class="empty"><div class="empty-icon">⏳</div><p>Chargement…</p></div>
    </div>
  </div>
</main>

<!-- ── DETAIL DRAWER ── -->
<div class="detail-overlay" id="detailOverlay"></div>
<div class="detail-drawer" id="detailDrawer">
  <div class="drawer-hero"></div>
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawerTitle">—</div>
      <div class="drawer-sub" id="drawerSub">—</div>
    </div>
    <button class="drawer-close" id="drawerClose">✕</button>
  </div>
  <div class="drawer-body">
    <div class="drawer-section" id="drawerResults"></div>
    <div class="drawer-section" id="drawerNotes"></div>
    <div class="drawer-section" id="drawerPhotos"></div>
    <div class="drawer-section" id="drawerVideos"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="" />
</div>

<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
  let races = [];

  async function loadPage() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      document.getElementById('userBottom').style.display = '';
      const name = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
      document.getElementById('userName').textContent = name;
      document.getElementById('userAv').textContent = name.charAt(0).toUpperCase();
    } else {
      const wall = document.getElementById('authWall');
      if (wall) wall.style.display = 'flex';
    }

    const { data } = await sb.from('races').select('*').eq('type', 'past').order('date', { ascending: false });
    races = data || [];
    renderGrid();
  }

  function renderGrid() {
    const el = document.getElementById('racesGrid');
    if (!races.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">🏅</div><p>Aucune course encore enregistrée</p></div>';
      return;
    }
    el.innerHTML = races.map((r, i) => {
      const d = new Date(r.date);
      const hasVid = r.videos && r.videos.length;
      const hasImg = r.images && r.images.length;
      return `
      <div class="race-thumb" onclick="openDrawer(${i})">
        <div class="race-thumb-top"></div>
        <div class="race-thumb-body">
          <div class="race-thumb-year">${d.toLocaleDateString('fr-FR',{month:'long', year:'numeric'})}</div>
          <div class="race-thumb-name">${r.name}</div>
          <div class="race-thumb-loc">📍 ${r.location || '—'}</div>
          <div class="race-thumb-stats">
            ${r.distance ? `<span class="race-thumb-stat">📏 ${r.distance} km</span>` : ''}
            ${r.dplus ? `<span class="race-thumb-stat">⛰️ ${r.dplus} m D+</span>` : ''}
            ${r.race_type ? `<span class="race-thumb-stat">${r.race_type}</span>` : ''}
          </div>
        </div>
        <div class="race-thumb-footer">
          <div>
            ${r.finish_time ? `<div class="race-thumb-time">${r.finish_time}</div>` : '<div style="color:var(--gray-300);font-size:0.8rem">Temps —</div>'}
            ${r.rank ? `<div class="race-thumb-rank">${r.rank}</div>` : ''}
          </div>
          <div class="race-thumb-icons">
            ${hasImg ? `<div class="media-icon has-img" title="Photos">🖼️</div>` : ''}
            ${hasVid ? `<div class="media-icon has-vid" title="Vidéos">🎬</div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function openDrawer(i) {
    const r = races[i];
    const d = new Date(r.date);

    document.getElementById('drawerTitle').textContent = r.name;
    document.getElementById('drawerSub').textContent = '📍 ' + (r.location||'—') + ' · ' + d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});

    // Résultats
    let html = '<div class="drawer-section-title">📊 Résultats</div><div class="result-grid">';
    html += `<div class="result-box accent"><div class="rb-val">${r.finish_time||'—'}</div><div class="rb-lbl">Temps de passage</div></div>`;
    html += `<div class="result-box"><div class="rb-val">${r.rank||'—'}</div><div class="rb-lbl">Classement</div></div>`;
    html += `<div class="result-box"><div class="rb-val">${r.distance ? r.distance+' km' : '—'}</div><div class="rb-lbl">Distance</div></div>`;
    html += `<div class="result-box"><div class="rb-val">${r.dplus ? r.dplus+' m' : '—'}</div><div class="rb-lbl">Dénivelé+</div></div>`;
    html += '</div>';
    document.getElementById('drawerResults').innerHTML = html;

    // Notes
    if (r.notes) {
      document.getElementById('drawerNotes').innerHTML = `<div class="drawer-section-title">📝 Notes</div><div class="drawer-notes">${r.notes}</div>`;
    } else {
      document.getElementById('drawerNotes').innerHTML = '';
    }

    // Photos
    let imgs = r.images || [];
    if (typeof imgs === 'string') { try { imgs = JSON.parse(imgs); } catch(e) { imgs = imgs.replace(/[{}"]/g,'').split(',').map(s=>s.trim()).filter(Boolean); } }
    if (imgs.length) {
      document.getElementById('drawerPhotos').innerHTML = `
        <div class="drawer-section-title">🖼️ Photos (${imgs.length})</div>
        <div class="photos-grid">${imgs.map(src => `<div class="photo-item" onclick="openLightbox('${src}')"><img src="${src}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'" /></div>`).join('')}</div>`;
    } else {
      document.getElementById('drawerPhotos').innerHTML = '';
    }

    // Vidéos
    let vids = r.videos || [];
    if (typeof vids === 'string') { try { vids = JSON.parse(vids); } catch(e) { vids = vids.replace(/[{}"]/g,'').split(',').map(s=>s.trim()).filter(Boolean); } }
    if (vids.length) {
      document.getElementById('drawerVideos').innerHTML = `
        <div class="drawer-section-title">🎬 Vidéos (${vids.length})</div>
        <div class="video-list">${vids.map(v => `<div class="video-item"><video src="${v}" controls preload="metadata"></video></div>`).join('')}</div>`;
    } else {
      document.getElementById('drawerVideos').innerHTML = '';
    }

    document.getElementById('detailOverlay').classList.add('open');
    document.getElementById('detailDrawer').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    document.getElementById('detailOverlay').classList.remove('open');
    document.getElementById('detailDrawer').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  document.getElementById('detailOverlay').addEventListener('click', closeDrawer);

  // Lightbox
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
  document.getElementById('lightbox').addEventListener('click', e => { if(e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); });

  document.getElementById('btnLogout')?.addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'index.html'; });

  loadPage();
</script>

<!-- ─── MODAL CONNEXION ─── -->
<div id="authWall" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(15,26,33,0.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;">
  <div style="background:white;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;margin:1rem;box-shadow:0 24px 80px rgba(0,0,0,0.2);">
    <div style="font-family:Montserrat,sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:0.25rem">Bienvenue !</div>
    <div style="color:#8fa3b0;font-size:0.875rem;margin-bottom:1.5rem">Connectez-vous pour accéder à ce contenu</div>
    <div style="display:flex;border-bottom:2px solid #eef2f5;margin-bottom:1.5rem">
      <button onclick="awShowTab('login')" id="awTabLogin" style="flex:1;padding:0.6rem;background:none;border:none;cursor:pointer;font-size:0.875rem;font-weight:600;color:#1a8fd1;border-bottom:2px solid #1a8fd1;margin-bottom:-2px">Connexion</button>
      <button onclick="awShowTab('signup')" id="awTabSignup" style="flex:1;padding:0.6rem;background:none;border:none;cursor:pointer;font-size:0.875rem;font-weight:600;color:#8fa3b0;border-bottom:2px solid transparent;margin-bottom:-2px">Inscription</button>
    </div>
    <div id="awLogin">
      <input id="awLoginEmail" type="email" placeholder="Email" style="width:100%;padding:0.7rem 1rem;border:1.5px solid #dce4ea;border-radius:8px;font-size:0.9rem;margin-bottom:0.875rem;outline:none;font-family:Inter,sans-serif" />
      <input id="awLoginPass" type="password" placeholder="Mot de passe" style="width:100%;padding:0.7rem 1rem;border:1.5px solid #dce4ea;border-radius:8px;font-size:0.9rem;margin-bottom:0.875rem;outline:none;font-family:Inter,sans-serif" />
      <button onclick="awLogin()" id="awBtnLogin" style="width:100%;padding:0.875rem;background:linear-gradient(135deg,#1a8fd1,#22a85e);color:white;border:none;border-radius:50px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:Inter,sans-serif">Se connecter</button>
      <div id="awLoginMsg" style="display:none;margin-top:0.75rem;padding:0.5rem;border-radius:8px;font-size:0.82rem;text-align:center"></div>
    </div>
    <div id="awSignup" style="display:none">
      <input id="awSignupName" type="text" placeholder="Prénom" style="width:100%;padding:0.7rem 1rem;border:1.5px solid #dce4ea;border-radius:8px;font-size:0.9rem;margin-bottom:0.875rem;outline:none;font-family:Inter,sans-serif" />
      <input id="awSignupEmail" type="email" placeholder="Email" style="width:100%;padding:0.7rem 1rem;border:1.5px solid #dce4ea;border-radius:8px;font-size:0.9rem;margin-bottom:0.875rem;outline:none;font-family:Inter,sans-serif" />
      <input id="awSignupPass" type="password" placeholder="Mot de passe (6 car. min)" style="width:100%;padding:0.7rem 1rem;border:1.5px solid #dce4ea;border-radius:8px;font-size:0.9rem;margin-bottom:0.875rem;outline:none;font-family:Inter,sans-serif" />
      <button onclick="awSignup()" id="awBtnSignup" style="width:100%;padding:0.875rem;background:linear-gradient(135deg,#1a8fd1,#22a85e);color:white;border:none;border-radius:50px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:Inter,sans-serif">Créer mon compte</button>
      <div id="awSignupMsg" style="display:none;margin-top:0.75rem;padding:0.5rem;border-radius:8px;font-size:0.82rem;text-align:center"></div>
    </div>
  </div>
</div>

<script>
  function awShowTab(tab) {
    document.getElementById('awLogin').style.display = tab==='login' ? '' : 'none';
    document.getElementById('awSignup').style.display = tab==='signup' ? '' : 'none';
    document.getElementById('awTabLogin').style.cssText += tab==='login' ? ';color:#1a8fd1;border-bottom:2px solid #1a8fd1' : ';color:#8fa3b0;border-bottom:2px solid transparent';
    document.getElementById('awTabSignup').style.cssText += tab==='signup' ? ';color:#1a8fd1;border-bottom:2px solid #1a8fd1' : ';color:#8fa3b0;border-bottom:2px solid transparent';
  }
  function awMsg(id, txt, type) {
    const el = document.getElementById(id);
    el.textContent = txt;
    el.style.display = '';
    el.style.background = type==='error' ? '#fee2e2' : '#e8f7ee';
    el.style.color = type==='error' ? '#b91c1c' : '#0d5230';
  }
  async function awLogin() {
    const email = document.getElementById('awLoginEmail').value;
    const pass = document.getElementById('awLoginPass').value;
    if (!email || !pass) return awMsg('awLoginMsg','Remplissez tous les champs.','error');
    const btn = document.getElementById('awBtnLogin');
    btn.disabled=true; btn.textContent='Connexion…';
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    btn.disabled=false; btn.textContent='Se connecter';
    if (error) return awMsg('awLoginMsg','Email ou mot de passe incorrect.','error');
    const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
    if (profile?.role === 'admin') { window.location.href = 'dashboard.html'; return; }
    document.getElementById('authWall').style.display = 'none';
    updateUserUI(data.user);
  }
  async function awSignup() {
    const name = document.getElementById('awSignupName').value;
    const email = document.getElementById('awSignupEmail').value;
    const pass = document.getElementById('awSignupPass').value;
    if (!name || !email || !pass) return awMsg('awSignupMsg','Remplissez tous les champs.','error');
    const btn = document.getElementById('awBtnSignup');
    btn.disabled=true; btn.textContent='Création…';
    const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
    btn.disabled=false; btn.textContent='Créer mon compte';
    if (error) return awMsg('awSignupMsg', error.message, 'error');
    const { data: loginData } = await sb.auth.signInWithPassword({ email, password: pass });
    if (loginData?.user) { document.getElementById('authWall').style.display='none'; updateUserUI(loginData.user); }
  }
  function updateUserUI(user) {
    const name = user.user_metadata?.full_name || user.email.split('@')[0];
    const bottom = document.getElementById('userBottom');
    if (bottom) { bottom.style.display=''; document.getElementById('userName').textContent=name; document.getElementById('userAv').textContent=name.charAt(0).toUpperCase(); }
  }
</script>
</body>
</html>
