<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses terminées — Trail Philou</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    .past-item {
      display: grid; grid-template-columns: 80px 1fr auto;
      align-items: center; gap: 1.25rem;
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-50);
      transition: background 0.15s;
    }
    .past-item:last-child { border-bottom: none; }
    .past-item:hover { background: var(--gray-50); }
    .date-block {
      text-align: center; padding: 0.6rem;
      background: linear-gradient(135deg, var(--blue), var(--green));
      border-radius: var(--r-sm); color: white;
    }
    .date-block .month { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; }
    .date-block .year { font-size: 1rem; font-weight: 800; }
    .race-info .rname { font-weight: 700; color: var(--gray-900); margin-bottom: 0.2rem; }
    .race-info .rdetail { font-size: 0.82rem; color: var(--gray-400); }
    .race-result { text-align: right; }
    .race-result .rtime { font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 800; color: var(--blue); }
    .race-result .rrank { font-size: 0.75rem; color: var(--gray-400); margin-top: 0.1rem; }
    .has-videos { cursor: pointer; }
    .has-videos .rname { color: var(--blue); }
    .videos-panel { display: none; padding: 1rem 1.5rem 1.5rem; background: var(--gray-50); border-bottom: 1px solid var(--gray-100); }
    .videos-panel.open { display: block; }
    .vid-tag { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; font-weight: 600; color: var(--green-dark); background: var(--green-light); border-radius: 50px; padding: 0.2rem 0.6rem; margin-left: 0.5rem; vertical-align: middle; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo">TRAIL PHILOU</div><div class="logo-sub">Mon univers trail</div></div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-link"><span class="ni">🏠</span> Accueil</a>
    <div class="sidebar-section">Mon trail</div>
    <a href="statistiques.html" class="nav-link"><span class="ni">📊</span> Statistiques</a>
    <a href="courses-terminees.html" class="nav-link active"><span class="ni">🏆</span> Courses terminées</a>
    <a href="prochaines-courses.html" class="nav-link"><span class="ni">🗓️</span> Prochaines courses</a>
    <a href="materiel.html" class="nav-link"><span class="ni">🎒</span> Mon matériel</a>
    <div style="flex:1"></div>
  </nav>
  <div class="sidebar-bottom" id="userBottom" style="display:none">
    <div class="user-pill">
      <div class="user-avatar" id="userAv">?</div>
      <div class="user-name" id="userName">—</div>
      <button class="btn-logout" id="btnLogout">⎋</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div class="page-title">🏆 Courses terminées</div>
    <div class="page-sub">Chaque finisher est une victoire</div>
  </div>
  <div class="page-content">
    <div class="card">
      <div class="card-body" style="padding:0" id="racesList">
        <div class="empty"><div class="empty-icon">⏳</div><p>Chargement…</p></div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
  async function loadPage() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      document.getElementById('userBottom').style.display = '';
      const name = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
      document.getElementById('userName').textContent = name;
      document.getElementById('userAv').textContent = name.charAt(0).toUpperCase();
    }

    const { data: races } = await sb.from('races').select('*').eq('type', 'past').order('date', { ascending: false });
    const el = document.getElementById('racesList');
    if (!races || !races.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">🏅</div><p>Aucune course encore enregistrée</p></div>';
      return;
    }
    el.innerHTML = races.map(r => {
      const d = new Date(r.date);
      const hasVid = r.videos && r.videos.length;
      return `
      <div>
        <div class="past-item ${hasVid ? 'has-videos' : ''}" onclick="${hasVid ? `toggleVid('vid-${r.id}')` : ''}">
          <div class="date-block">
            <div class="month">${d.toLocaleDateString('fr-FR',{month:'short'})}</div>
            <div class="year">${d.getFullYear()}</div>
          </div>
          <div class="race-info">
            <div class="rname">${r.name}${hasVid ? `<span class="vid-tag">🎬 ${r.videos.length} vidéo${r.videos.length>1?'s':''}</span>` : ''}</div>
            <div class="rdetail">📍 ${r.location||'—'} · ${r.distance ? r.distance+' km' : ''} ${r.dplus ? '· '+r.dplus+' m D+' : ''}</div>
          </div>
          <div class="race-result">
            ${r.finish_time ? `<div class="rtime">${r.finish_time}</div>` : ''}
            ${r.rank ? `<div class="rrank">${r.rank}</div>` : ''}
          </div>
        </div>
        ${hasVid ? `<div class="videos-panel" id="vid-${r.id}">
          <div style="font-size:0.8rem;font-weight:700;color:var(--gray-400);margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.08em;">🎬 Vidéos de la course</div>
          <div class="vid-grid">
            ${r.videos.map(v => `
              <div class="vid-item">
                <video src="${v}" controls preload="metadata"></video>
              </div>`).join('')}
          </div>
        </div>` : ''}
      </div>`;
    }).join('');
  }

  function toggleVid(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
  }

  document.getElementById('btnLogout')?.addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'index.html'; });
  loadPage();
</script>
</body>
</html>
